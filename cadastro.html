<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet shop zone</title>
    <link rel="shortcut icon" href="imagens/favicon.png" type="image/x-icon">
    <link rel="stylesheet" href="estilo/style.css">
</head>
<body>
    <header>
        <h1>
            Pet New Life
        </h1>
        <p>
            Esse site é para ajudar animais a encontrarem um lar cheio de amor e cuidado.
        </p>
    </header>
    <nav>
        <a href="index.html">Home</a>
        <a href="pets.html">Cachorros</a>
         <a href="cats.html">Gatos</a>
       
        
        
        
    </nav>

    <main>

        <div class="container_formulario">
        <h1 class="formulario_titulo">Formulário de Adoção</h1>
        <p class="formulario_titulo_p">Preencha os dados abaixo para iniciar o processo de adoção</p>

        

        <form id="formAdocao">
        
        <div class:="linha">
            <div class="campo">
                <label>Nome completo *</label>
                <input type="text" id="nome" required>
            </div>

            <div class="campo">
                <label>Telefone/WhatsApp *</label>
                <input type="tel" id="telefone" required>
            </div>

            <div class="campo">
                <label>Tipo de moradia *</label>
                <select id="tipoMoradia" required>
                  <option value="">Selecione...</option>

                  <option value="casa">Casa</option>
                 <option value="apartamento">Apartamento</option>
                 </select>
                 </div>

                 <div class="linha">
                   <div class="campo">
                    <label>Condição do Imóvel * </label>
                    <select id="condicaoImovel" required>
                      <option value="">Selecione...</option>
                      <option value="proprio">Próprio</option>
                      <option value="alugado">Alugado</option>
                      </select>
                    </div>

                    <div class="campo">
                 <label>Quantas pessoas moram na casa? *</label>
                  <input type="number" id="numeroPessoas" required>
                  </div>
                  </div>

                  <div class="campo">
                <label>Por que deseja adotar esses pets?</label>
                <textarea id="motivo" required></textarea>
                </div>
                <label class="checkbox">
                    <input type="checkbox" id="termos" required>
                     li e aceito os termos
                </label>

                <button type="submit">Enviar Solicitação</button>

                </form>

                  


                        

    
        

        
    </div>
    </main>
</body>
</html>
