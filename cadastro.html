<body>
    <header>
        <h1>
            Pet New Life

            Esse site é para ajudar animais a encontrarem um lar cheio de amor e cuidado.
        </p>

    <main>

        <div class="container_formulario">
        <h1>Formulário de Adoção</h1>
        <p>Preencha os dados abaixo para iniciar o processo de adoção</p>

        <form>

            <form id="formAdocao">

    <input type="text" id="nome" placeholder="Nome Completo" required>

    <input type="tel" id="telefone" placeholder="Telefone" required>

    <select id="tipoMoradia" required>
        <option value="">Selecione...</option>
        <option value="casa">Casa</option>
        <option value="apartamento">Apartamento</option>
        <option value="sitio">Sítio/Chácara</option>
    </select>

    <select id="condicaoImovel" required>
        <option value="">Selecione...</option>
        <option value="proprio">Próprio</option>
        <option value="alugado">Alugado</option>
        <option value="familiares">Casa de Familiares</option>
    </select>

    <input type="number" id="numero" min="1" required>

    <textarea id="motivo" required></textarea>

    <label>
        <input type="checkbox" id="termos" required>
        Aceito os termos
    </label>

    <button type="submit">Enviar</button>

</form>

        </form>
    </div>
    </main>
</body>
